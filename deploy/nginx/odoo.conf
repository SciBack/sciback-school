upstream odoo {
    server odoo:8069;
}

upstream odoo_longpoll {
    server odoo:8072;
}

server {
    listen 80;
    server_name _;

    # Redirigir a HTTPS en producción (el overlay prod añade el bloque 443)
    # En dev sirve directo en 80

    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    client_max_body_size 200m;

    # Longpolling
    location /longpolling {
        proxy_pass http://odoo_longpoll;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos (cache agresivo)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://odoo;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Todo lo demás
    location / {
        proxy_pass http://odoo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Bloquear rutas sensibles
    location ~* ^/(web/database|xmlrpc/2/db) {
        deny all;
        return 403;
    }
}
