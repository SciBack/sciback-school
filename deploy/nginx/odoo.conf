# ============================================================
# SciBack Odoo — Nginx multi-tenant (DEV / base compose, HTTP)
# En PRODUCCIÓN este archivo lo REEMPLAZA Ansible renderizando
# odoo.conf.template (con BASE_DOMAIN + SSL wildcard). Ver README-multitenant.md
# Dev: cada colegio entra por http://<colegio>.localhost
# ============================================================

upstream odoo          { server odoo:8069; }
upstream odoo_longpoll { server odoo:8072; }

server {
    listen 80;
    server_name ~^(?<colegio>.+)\.localhost$;

    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    client_max_body_size 200m;

    location /longpolling {
        proxy_pass http://odoo_longpoll;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://odoo;
        proxy_set_header Host $host;          # Odoo resuelve la DB por el Host (dbfilter)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location ~* ^/(web/database|xmlrpc/2/db) {
        deny all;
        return 403;
    }
}
