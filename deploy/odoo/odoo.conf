[options]
; ============================================================
; SciBack School — Configuración Odoo 17
; Variables ${...} son sustituidas por Ansible en producción
; ============================================================

addons_path = /mnt/extra-addons/openeducat,/mnt/extra-addons/oca-queue,/usr/lib/python3/dist-packages/odoo/addons

; Base de datos
db_host = ${POSTGRES_HOST}
db_port = ${POSTGRES_PORT}
db_user = ${POSTGRES_USER}
db_password = ${POSTGRES_PASSWORD}
; Multi-tenant: NO se fija una DB. Cada colegio entra por su subdominio.
;   <colegio>.${BASE_DOMAIN}  ->  %d = "<colegio>"  ->  DB "<colegio>"
db_name = False
dbfilter = ^%d$
db_maxconn = 64

; Seguridad
admin_passwd = ${ODOO_MASTER_PASSWORD}
list_db = False

; Workers (pod multi-tenant: usar >0. Regla: 2*vCPU+1. t3.xlarge=4vCPU -> ~6-8)
workers = ${ODOO_WORKERS}
max_cron_threads = ${ODOO_CRON_THREADS}

; Logs
logfile = /var/log/odoo/odoo.log
log_level = warn
log_handler = werkzeug:CRITICAL

; Longpolling (live chat, notificaciones)
longpolling_port = 8072

; Límites
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 120
limit_time_real = 240

; Redis para queue_job
; redis_host = ${REDIS_HOST}
; redis_port = ${REDIS_PORT}
