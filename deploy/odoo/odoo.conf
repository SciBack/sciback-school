[options]
; ============================================================
; SciBack School — Configuración Odoo 17
; Variables ${...} son sustituidas por Ansible en producción
; ============================================================

addons_path = /mnt/extra-addons/openeducat,/mnt/extra-addons/oca-queue,/usr/lib/python3/dist-packages/odoo/addons

; Base de datos
db_host = ${POSTGRES_HOST}
db_port = ${POSTGRES_PORT}
db_user = ${POSTGRES_USER}
db_password = ${POSTGRES_PASSWORD}
db_name = ${ODOO_DB_NAME}
db_maxconn = 64

; Seguridad
admin_passwd = ${ODOO_MASTER_PASSWORD}
list_db = False

; Workers (0 = modo dev multi-thread; >0 = modo prod multi-process)
workers = 0
max_cron_threads = 1

; Logs
logfile = /var/log/odoo/odoo.log
log_level = warn
log_handler = werkzeug:CRITICAL

; Longpolling (live chat, notificaciones)
longpolling_port = 8072

; Límites
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 120
limit_time_real = 240

; Redis para queue_job
; redis_host = ${REDIS_HOST}
; redis_port = ${REDIS_PORT}
