version: "3.9"

# ============================================================
# SciBack School — Docker Compose (desarrollo local)
# Uso: make dev
# ============================================================

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-sciback_school}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: unless-stopped

  odoo:
    # IMPORTANTE: instalar 'website' antes de OpenEduCat (dep oculta Odoo 17)
    # make install MOD=website && make install MOD=openeducat_core,...
    image: ${ODOO_IMAGE:-odoo:17.0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      HOST: db
      PORT: 5432
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    volumes:
      - odoo_data:/var/lib/odoo
      - ../src/modules:/mnt/extra-addons:ro
      - ./odoo/odoo.conf:/etc/odoo/odoo.conf:ro
    ports:
      - "8069:8069"
      - "8072:8072"
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - odoo
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
  odoo_data:
